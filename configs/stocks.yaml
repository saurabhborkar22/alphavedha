# ─── News Aliases ────────────────────────────────────────
# Company-name variants used to map news headlines to NSE symbols.
# Matching rules (intel/symbols.py): aliases match case-insensitively on
# word boundaries; the NSE ticker itself additionally matches as an
# exact-case uppercase word. Keep aliases specific — a bare "Tata" or
# "Reliance" would tag unrelated group companies.
# Used by: telegram news collector, live news watcher
