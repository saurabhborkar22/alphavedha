      - {name: stoch_d_14, window: 14, source: hlc, unit: ratio_0_100}
      - {name: macd_12_26, window: "12/26", source: close, unit: raw}
      - {name: macd_signal_12_26, window: "12/26/9", source: close, unit: raw}
      - {name: macd_hist_12_26, window: "12/26/9", source: close, unit: raw}
      - {name: willr_14, window: 14, source: hlc, unit: ratio_neg100_0}
      - {name: roc_10, window: 10, source: close, unit: percentage}
      - {name: roc_20, window: 20, source: close, unit: percentage}
      - {name: cci_20, window: 20, source: hlc, unit: raw}
    trend:
      - {name: sma_20, window: 20, source: close, unit: price}
      - {name: sma_50, window: 50, source: close, unit: price}
      - {name: sma_200, window: 200, source: close, unit: price}
      - {name: ema_9, window: 9, source: close, unit: price}
      - {name: ema_21, window: 21, source: close, unit: price}
      - {name: price_to_sma_20, window: 20, source: close, unit: ratio}
      - {name: price_to_sma_50, window: 50, source: close, unit: ratio}
      - {name: adx_14, window: 14, source: hlc, unit: ratio_0_100}
      - {name: dip_14, window: 14, source: hlc, unit: ratio_0_100}
      - {name: dim_14, window: 14, source: hlc, unit: ratio_0_100}
    volatility:
      - {name: bb_upper_20, window: 20, source: close, unit: price}
      - {name: bb_lower_20, window: 20, source: close, unit: price}
      - {name: bb_width_20, window: 20, source: close, unit: ratio}
      - {name: bb_pct_20, window: 20, source: close, unit: ratio}
      - {name: atr_14, window: 14, source: hlc, unit: price}
      - {name: natr_14, window: 14, source: hlc, unit: percentage}
      - {name: hvol_20, window: 20, source: close, unit: annualized_pct}
      - {name: hvol_60, window: 60, source: close, unit: annualized_pct}
    volume:
      - {name: obv, window: null, source: close_volume, unit: raw}
      - {name: obv_ema_20, window: 20, source: obv, unit: raw}
      - {name: vol_sma_20, window: 20, source: volume, unit: raw}
      - {name: vol_ratio_20, window: 20, source: volume, unit: ratio}
      - {name: vwap_20, window: 20, source: hlcv, unit: price}
      - {name: price_to_vwap_20, window: 20, source: close_vwap, unit: ratio}
      - {name: mfi_14, window: 14, source: hlcv, unit: ratio_0_100}
      - {name: ad, window: null, source: hlcv, unit: raw}
      - {name: cho_3_10, window: "3/10", source: ad, unit: raw}
      - {name: fi_13, window: 13, source: close_volume, unit: raw}

