server {
    listen 80;
    server_name _;

    # FastAPI — strip /api prefix before forwarding
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        # Full-tier scans recompute features for 50 symbols on a cold
        # cache — allow well past the worst observed scan duration.
        proxy_read_timeout 300s;
    }

    # FastAPI docs (direct, no prefix strip needed)
    location /docs {
        proxy_pass http://api:8000;
    }

    location /openapi.json {
        proxy_pass http://api:8000;
    }

    # Next.js UI — everything else
    location / {
        proxy_pass             http://ui:3000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_read_timeout     60s;
    }
}
