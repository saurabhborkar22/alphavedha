name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: lint-${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: lint-${{ runner.os }}-pip-

      - name: Install lint dependencies
        run: pip install "ruff==0.15.12" mypy pydantic

      - name: Ruff check
        run: ruff check alphavedha/ tests/

      - name: Ruff format check
        run: ruff format --check alphavedha/ tests/

      - name: Mypy
        run: mypy alphavedha/ --ignore-missing-imports
        continue-on-error: true

  test:
    name: Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: test-${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: test-${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --cov=alphavedha --cov-report=term-missing --cov-report=xml --cov-fail-under=0

  security:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: security-${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: security-${{ runner.os }}-pip-

      - name: Install audit tools
        run: pip install pip-audit pip-tools

      - name: Compile third-party dependency lockfile
        run: pip-compile pyproject.toml --extra dev --output-file /tmp/audit-reqs.txt --quiet

      - name: Audit third-party dependencies
        # CVE-2025-3000: torch.jit.script memory corruption — local-only attack vector,
        # no fix available upstream. Not exploitable in a training pipeline context.
        run: pip-audit --strict --desc -r /tmp/audit-reqs.txt --ignore-vuln CVE-2025-3000

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [lint, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Verify VPS host key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          EXPECTED: ${{ secrets.VPS_HOST_FINGERPRINT }}
        run: |
          ACTUAL=$(ssh-keyscan -t ed25519 "$VPS_HOST" 2>/dev/null | ssh-keygen -lf - | awk '{print $2}')
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "ERROR: Host key fingerprint mismatch"
            echo "  Expected: $EXPECTED"
            echo "  Got:      $ACTUAL"
            exit 1
          fi
          mkdir -p ~/.ssh
          ssh-keyscan -t ed25519 "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17  # v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GITHUB_SHA
          script: |
            set -euo pipefail
            cd /opt/alphavedha/alphavedha
            git fetch origin
            git -c advice.detachedHead=false checkout "$GITHUB_SHA"
            docker compose -f docker-compose.vps.yml --profile training build api scheduler trainer
            docker compose -f docker-compose.vps.yml up -d api scheduler
            docker compose -f docker-compose.vps.yml restart nginx
            docker compose -f docker-compose.vps.yml exec -T api alembic upgrade head
            echo "Deploy complete: $GITHUB_SHA"
