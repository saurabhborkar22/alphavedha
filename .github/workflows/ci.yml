name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: lint-${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: lint-${{ runner.os }}-pip-

      - name: Install lint dependencies
        run: pip install "ruff==0.15.12" mypy pydantic

      - name: Ruff check
        run: ruff check alphavedha/ tests/

      - name: Ruff format check
        run: ruff format --check alphavedha/ tests/

      - name: Mypy
        run: mypy alphavedha/ --ignore-missing-imports
        continue-on-error: true

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: test-${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: test-${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --cov=alphavedha --cov-report=term-missing --cov-report=xml --cov-fail-under=0

      - name: Upload coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  security:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies and pip-audit
        run: pip install -e ".[dev]" pip-audit

      - name: Audit dependencies
        run: pip-audit --strict --desc
        continue-on-error: true
