name: Train Models on VPS

on:
  # Automatic: every Saturday 10:30 PM IST (17:00 UTC) — trains all models
  schedule:
    - cron: '0 17 * * 6'

  # Manual: trigger any model at any time from GitHub Actions tab
  workflow_dispatch:
    inputs:
      model:
        description: "Model to train"
        required: true
        default: xgboost
        type: choice
        options:
          - xgboost
          - lstm
          - tft
          - regime
          - ensemble
          - meta
          - conformal
          - all
      scale_server:
        description: "Scale server to cx43 before training (required for lstm/tft/all — not needed for xgboost/regime/ensemble/meta/conformal)"
        required: false
        default: false
        type: boolean

concurrency:
  group: train-vps
  cancel-in-progress: false

jobs:
  train:
    name: Train models on VPS
    runs-on: ubuntu-latest
    environment: production
    steps:
      # Resolve defaults: schedule trigger always trains all + scales up;
      # workflow_dispatch uses whatever the user selected.
      - name: Resolve training parameters
        env:
          EVENT: ${{ github.event_name }}
          INPUT_MODEL: ${{ inputs.model }}
          INPUT_SCALE: ${{ inputs.scale_server }}
        run: |
          if [ "$EVENT" = "schedule" ]; then
            echo "TRAIN_MODEL=all" >> "$GITHUB_ENV"
            echo "DO_SCALE=true"  >> "$GITHUB_ENV"
          else
            echo "TRAIN_MODEL=$INPUT_MODEL" >> "$GITHUB_ENV"
            if [ "$INPUT_SCALE" = "true" ]; then
              echo "DO_SCALE=true"  >> "$GITHUB_ENV"
            else
              echo "DO_SCALE=false" >> "$GITHUB_ENV"
            fi
          fi

      - name: Scale up server (cx23 → cx43)
        if: env.DO_SCALE == 'true'
        env:
          HETZNER_TOKEN: ${{ secrets.HETZNER_TOKEN }}
          SERVER_ID: ${{ secrets.HETZNER_SERVER_ID }}
        run: |
          hcloud() {
            local resp
            resp=$(curl -s -w "\n%{http_code}" "$@")
            local code=$(echo "$resp" | tail -1)
            local body=$(echo "$resp" | sed '$d')
            if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
              echo "ERROR: HTTP $code — $body" >&2
              return 1
            fi
            echo "$body"
          }

          wait_for_status() {
            local target=$1 timeout=$2
            echo "Waiting up to ${timeout}s for server status=$target..."
            for i in $(seq 1 "$timeout"); do
              status=$(hcloud -H "Authorization: Bearer $HETZNER_TOKEN" \
                "https://api.hetzner.cloud/v1/servers/$SERVER_ID" \
                | python3 -c "import sys,json; print(json.load(sys.stdin)['server']['status'])")
              if [ "$status" = "$target" ]; then
                echo "Server is $target (after ${i}s)"
                return 0
              fi
              sleep 1
            done
            echo "ERROR: Server still '$status' after ${timeout}s (wanted '$target')" >&2
            return 1
          }

          echo "Scaling up to cx43 for heavy training..."

          hcloud -X POST \
            -H "Authorization: Bearer $HETZNER_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.hetzner.cloud/v1/servers/$SERVER_ID/actions/poweroff" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('poweroff:', d.get('action',{}).get('status','?'))"

          wait_for_status "off" 120

          hcloud -X POST \
            -H "Authorization: Bearer $HETZNER_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"server_type":"cx43","upgrade_disk":false}' \
            "https://api.hetzner.cloud/v1/servers/$SERVER_ID/actions/change_type" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('resize:', d.get('action',{}).get('status','?'))"

          sleep 15

          hcloud -X POST \
            -H "Authorization: Bearer $HETZNER_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.hetzner.cloud/v1/servers/$SERVER_ID/actions/poweron" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('poweron:', d.get('action',{}).get('status','?'))"

          wait_for_status "running" 120

      - name: Verify VPS host key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          EXPECTED: ${{ secrets.VPS_HOST_FINGERPRINT }}
        run: |
          echo "Waiting for SSH to become ready..."
          for i in $(seq 1 60); do
            KEY=$(ssh-keyscan -t ed25519 "$VPS_HOST" 2>/dev/null) || true
            if [ -n "$KEY" ]; then
              echo "SSH ready (after ${i}s)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "ERROR: SSH not ready after 60s"
              exit 1
            fi
            sleep 1
          done

          ACTUAL=$(echo "$KEY" | ssh-keygen -lf - | awk '{print $2}')
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "ERROR: Host key fingerprint mismatch"
            echo "  Expected: $EXPECTED"
            echo "  Got:      $ACTUAL"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$KEY" >> ~/.ssh/known_hosts

      - name: Run training on VPS
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17  # v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 8h
          envs: TRAIN_MODEL
          script: |
            set -euo pipefail
            cd /opt/alphavedha/alphavedha
            echo "Starting training: model=$TRAIN_MODEL tier=large"
            docker compose -f docker-compose.vps.yml --env-file .env.vps --profile training run --rm \
              -e ALPHAVEDHA_HEAVY_TRAINING=1 \
              trainer \
              python -m alphavedha.cli.main train "$TRAIN_MODEL" --tier large
            echo "Training complete: $TRAIN_MODEL"

      # always() ensures scale-down runs even if training failed — never leave on cx43 by accident
      - name: Scale down server (cx43 → cx23)
        if: always() && env.DO_SCALE == 'true'
        env:
          HETZNER_TOKEN: ${{ secrets.HETZNER_TOKEN }}
          SERVER_ID: ${{ secrets.HETZNER_SERVER_ID }}
        run: |
          hcloud() {
            local resp
            resp=$(curl -s -w "\n%{http_code}" "$@")
            local code=$(echo "$resp" | tail -1)
            local body=$(echo "$resp" | sed '$d')
            if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
              echo "ERROR: HTTP $code — $body" >&2
              return 1
            fi
            echo "$body"
          }

          wait_for_status() {
            local target=$1 timeout=$2
            echo "Waiting up to ${timeout}s for server status=$target..."
            for i in $(seq 1 "$timeout"); do
              status=$(hcloud -H "Authorization: Bearer $HETZNER_TOKEN" \
                "https://api.hetzner.cloud/v1/servers/$SERVER_ID" \
                | python3 -c "import sys,json; print(json.load(sys.stdin)['server']['status'])")
              if [ "$status" = "$target" ]; then
                echo "Server is $target (after ${i}s)"
                return 0
              fi
              sleep 1
            done
            echo "ERROR: Server still '$status' after ${timeout}s (wanted '$target')" >&2
            return 1
          }

          echo "Scaling back down to cx23..."

          hcloud -X POST \
            -H "Authorization: Bearer $HETZNER_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.hetzner.cloud/v1/servers/$SERVER_ID/actions/poweroff" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('poweroff:', d.get('action',{}).get('status','?'))"

          wait_for_status "off" 120

          hcloud -X POST \
            -H "Authorization: Bearer $HETZNER_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"server_type":"cx23","upgrade_disk":false}' \
            "https://api.hetzner.cloud/v1/servers/$SERVER_ID/actions/change_type" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('resize:', d.get('action',{}).get('status','?'))"

          sleep 15

          hcloud -X POST \
            -H "Authorization: Bearer $HETZNER_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.hetzner.cloud/v1/servers/$SERVER_ID/actions/poweron" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('poweron:', d.get('action',{}).get('status','?'))"

          wait_for_status "running" 120
          echo "Server back to cx23 (€3.99/mo)."
