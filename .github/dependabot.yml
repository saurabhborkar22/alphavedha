version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "deps:"
    ignore:
      # fastapi>=0.137 ships starlette's _IncludedRouter, which breaks
      # prometheus-fastapi-instrumentator route iteration. Keep pinned <0.137.
      - dependency-name: "fastapi"
        versions: [">=0.137"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - ci
    commit-message:
      prefix: "ci:"
